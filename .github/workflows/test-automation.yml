name: Test Automation

on:
  push:
    branches: [main, develop]
  pull_request:
    types: [opened, synchronize, reopened]

env:
  PYTHON_VERSION: "3.14"
  NODE_VERSION: "20"

jobs:
  initialize-database:
    runs-on: ubuntu-latest
    env:
      BASE_URL: ${{ secrets.BASE_URL || 'https://parabank.parasoft.com' }}

    steps:
      - name: Initialize ParaBank Database
        id: init-db
        run: |
          echo "Initializing ParaBank database..."

          response=$(curl -X POST "${{ env.BASE_URL }}/parabank/services/bank/initializeDB" \
            --silent \
            --write-out "HTTPSTATUS:%{http_code}" \
            --fail-with-body \
            --retry 3 \
            --retry-delay 5 \
            --max-time 60)

          # Extract HTTP status code
          http_code=$(echo $response | tr -d '\n' | sed -e 's/.*HTTPSTATUS://')

          if [ "$http_code" -eq 200 ] || [ "$http_code" -eq 204 ]; then
            echo "✅ Database initialized successfully (HTTP: $http_code)"
            echo "status=success" >> $GITHUB_OUTPUT
          else
            echo "❌ Database initialization failed (HTTP: $http_code)"
            echo "Response: $response"
            echo "status=failure" >> $GITHUB_OUTPUT
            exit 1
          fi

  api-tests:
    name: API Tests
    runs-on: ubuntu-latest
    needs: [initialize-database]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: latest
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Install dependencies
        run: |
          poetry install
          poetry run playwright install --with-deps chromium

      - name: Run API Tests
        env:
          BASE_URL: ${{ secrets.BASE_URL || 'https://parabank.parasoft.com' }}
          USERNAME_1: ${{ secrets.USERNAME_1 }}
          PASSWORD_1: ${{ secrets.PASSWORD_1 }}
          USER_FULLNAME_1: ${{ secrets.USER_FULLNAME_1 }}
        run: |
          poetry run pytest tests/API/ \
            --alluredir=allure-results \
            --html=reports/html/api-report.html \
            -v

      - name: Debug - List Allure Results
        if: always()
        run: |
          echo "=== Allure Results Files ==="
          ls -la allure-results/ || echo "No allure-results directory"
          find allure-results/ -name "*.json" | wc -l || echo "0 JSON files"

      - name: Upload API Allure Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: api-allure-results
          path: allure-results/
          retention-days: 30

      - name: Upload API HTML Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: api-html-report-${{ github.run_number }}
          path: reports/html/
          retention-days: 30

  ui-tests:
    name: UI Tests
    runs-on: ubuntu-latest
    needs: [initialize-database]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: latest
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Install dependencies
        run: |
          poetry install
          poetry run playwright install --with-deps chromium

      - name: Run UI Tests
        env:
          BASE_URL: ${{ secrets.BASE_URL || 'https://parabank.parasoft.com' }}
          USERNAME_1: ${{ secrets.USERNAME_1 }}
          PASSWORD_1: ${{ secrets.PASSWORD_1 }}
          USER_FULLNAME_1: ${{ secrets.USER_FULLNAME_1 }}
        run: |
          poetry run pytest tests/UI/ \
            --browser=chromium \
            --alluredir=allure-results \
            --html=reports/html/ui-report.html \
            -v

      - name: Debug - List Allure Results
        if: always()
        run: |
          echo "=== Allure Results Files ==="
          ls -la allure-results/ || echo "No allure-results directory"
          find allure-results/ -name "*.json" | wc -l || echo "0 JSON files"

      - name: Upload UI Allure Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ui-allure-results
          path: allure-results/
          retention-days: 30

      - name: Upload UI HTML Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ui-html-report-${{ github.run_number }}
          path: |
            reports/html/
            test-results/
          retention-days: 30

  generate-allure-report:
    name: Generate Allure Report
    runs-on: ubuntu-latest
    needs: [api-tests, ui-tests]
    if: always()
    permissions:
      contents: write
      pages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download API Allure Results
        uses: actions/download-artifact@v4
        with:
          name: api-allure-results
          path: downloaded-results/api/

      - name: Download UI Allure Results
        uses: actions/download-artifact@v4
        with:
          name: ui-allure-results
          path: downloaded-results/ui/

      - name: Debug - Show Downloaded Structure
        run: |
          echo "=== Downloaded Results Structure ==="
          echo "API Results:"
          ls -la downloaded-results/api/ || echo "No API results"
          find downloaded-results/api/ -name "*.json" | wc -l
          echo ""
          echo "UI Results:"
          ls -la downloaded-results/ui/ || echo "No UI results"
          find downloaded-results/ui/ -name "*.json" | wc -l

      - name: Combine Allure Results
        run: |
          mkdir -p combined-allure-results

          # Copy API results
          if [ -d "downloaded-results/api" ] && [ "$(ls -A downloaded-results/api 2>/dev/null)" ]; then
            cp -r downloaded-results/api/* combined-allure-results/
            echo "✅ Copied $(find downloaded-results/api -name '*.json' | wc -l) API result files"
          else
            echo "⚠️ No API results found"
          fi

          # Copy UI results
          if [ -d "downloaded-results/ui" ] && [ "$(ls -A downloaded-results/ui 2>/dev/null)" ]; then
            cp -r downloaded-results/ui/* combined-allure-results/
            echo "✅ Copied $(find downloaded-results/ui -name '*.json' | wc -l) UI result files"
          else
            echo "⚠️ No UI results found"
          fi

          echo ""
          echo "=== Combined Results ==="
          ls -la combined-allure-results/
          echo "Total JSON files: $(find combined-allure-results -name '*.json' | wc -l)"

      - name: Get Allure History
        uses: actions/checkout@v4
        if: always()
        continue-on-error: true
        with:
          ref: gh-pages
          path: gh-pages

      - name: Setup Allure History
        run: |
          mkdir -p allure-history
          if [ -d "gh-pages/reports" ]; then
            # Get the latest report number
            latest=$(ls -d gh-pages/reports/*/ 2>/dev/null | sort -t/ -k4 -n | tail -1)
            if [ -d "$latest/history" ]; then
              cp -r "$latest/history"/* allure-history/ 2>/dev/null || true
              echo "✅ Copied history from $latest"
            fi
          fi

      - name: Generate Allure Report
        uses: simple-elf/allure-report-action@v1.9
        with:
          allure_results: combined-allure-results
          allure_report: allure-report
          allure_history: allure-history
          keep_reports: 10

      - name: Debug - Verify Generated Report
        run: |
          echo "=== Generated Report Structure ==="
          ls -la allure-report/
          echo ""
          echo "HTML files:"
          find allure-report/ -name "*.html" | head -5
          echo ""
          echo "Data directory:"
          ls -la allure-report/data/ 2>/dev/null || echo "No data directory"
          echo ""
          echo "Widgets directory:"
          ls -la allure-report/widgets/ 2>/dev/null || echo "No widgets directory"

      - name: Upload Combined Allure Report
        uses: actions/upload-artifact@v4
        with:
          name: allure-report-${{ github.run_number }}
          path: allure-report/
          retention-days: 30

      - name: Deploy to GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: allure-report
          destination_dir: reports/${{ github.run_number }}
          keep_files: true

      - name: Print Report URL
        run: |
          echo "📊 Allure Report URL:"
          echo "https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/reports/${{ github.run_number }}/"
