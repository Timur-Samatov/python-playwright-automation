name: Test Automation

on:
  push:
    branches: [main, develop]
  pull_request:
    types: [opened, synchronize, reopened]

env:
  PYTHON_VERSION: "3.14"
  NODE_VERSION: "20"

jobs:
  initialize-database:
    runs-on: ubuntu-latest
    env:
      BASE_URL: ${{ secrets.BASE_URL || 'https://parabank.parasoft.com' }}

    steps:
      - name: Initialize ParaBank Database
        id: init-db
        run: |
          echo "Initializing ParaBank database..."

          response=$(curl -X POST "${{ env.BASE_URL }}/parabank/services/bank/initializeDB" \
            --silent \
            --write-out "HTTPSTATUS:%{http_code}" \
            --fail-with-body \
            --retry 3 \
            --retry-delay 5 \
            --max-time 60)

          # Extract HTTP status code
          http_code=$(echo $response | tr -d '\n' | sed -e 's/.*HTTPSTATUS://')

          if [ "$http_code" -eq 200 ] || [ "$http_code" -eq 204 ]; then
            echo "✅ Database initialized successfully (HTTP: $http_code)"
            echo "status=success" >> $GITHUB_OUTPUT
          else
            echo "❌ Database initialization failed (HTTP: $http_code)"
            echo "Response: $response"
            echo "status=failure" >> $GITHUB_OUTPUT
            exit 1
          fi

  api-tests:
    name: API Tests
    runs-on: ubuntu-latest
    needs: [initialize-database]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: latest
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Install dependencies
        run: |
          poetry install
          poetry run playwright install --with-deps chromium

      - name: Run API Tests
        env:
          BASE_URL: ${{ secrets.BASE_URL || 'https://parabank.parasoft.com' }}
          USERNAME_1: ${{ secrets.USERNAME_1 }}
          PASSWORD_1: ${{ secrets.PASSWORD_1 }}
          USER_FULLNAME_1: ${{ secrets.USER_FULLNAME_1 }}
        run: |
          poetry run pytest tests/API/ \
            --alluredir=reports/allure-api \
            --html=reports/html/api-report.html

      - name: Upload API Test Reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: api-test-reports-${{ github.run_number }}
          path: |
            reports/allure-api/
            reports/html/api-report.html
          retention-days: 30

  ui-tests:
    name: UI Tests
    runs-on: ubuntu-latest
    needs: [initialize-database]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: latest
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Install dependencies
        run: |
          poetry install
          poetry run playwright install --with-deps chromium

      - name: Run UI Tests
        env:
          BASE_URL: ${{ secrets.BASE_URL || 'https://parabank.parasoft.com' }}
          USERNAME_1: ${{ secrets.USERNAME_1 }}
          PASSWORD_1: ${{ secrets.PASSWORD_1 }}
          USER_FULLNAME_1: ${{ secrets.USER_FULLNAME_1 }}
        run: |
          poetry run pytest tests/UI/ \
            --browser=chromium \
            --alluredir=reports/allure-ui \
            --html=reports/html/ui-report.html

      - name: Upload UI Test Reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ui-test-reports-${{ github.run_number }}
          path: |
            reports/allure-ui/
            reports/html/ui-report.html
            test-results/
          retention-days: 30

      - name: Upload Playwright Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-${{ github.run_number }}
          path: playwright-report/
          retention-days: 30

  generate-allure-report:
    name: Generate Allure Report
    runs-on: ubuntu-latest
    needs: [api-tests, ui-tests]
    if: always()

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download API Test Results
        uses: actions/download-artifact@v4
        with:
          name: api-test-reports-${{ github.run_number }}
          path: reports/

      - name: Download UI Test Results
        uses: actions/download-artifact@v4
        with:
          name: ui-test-reports-${{ github.run_number }}
          path: reports/

      - name: Generate Allure Report
        uses: simple-elf/allure-report-action@master
        with:
          allure_results: reports/allure-api,reports/allure-ui
          allure_report: allure-report
          allure_history: allure-history

      - name: Upload Combined Allure Report
        uses: actions/upload-artifact@v4
        with:
          name: allure-report-${{ github.run_number }}
          path: allure-report/
          retention-days: 30

      - name: Deploy to GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: allure-report
          destination_dir: reports/${{ github.run_number }}
